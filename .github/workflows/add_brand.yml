name: Auto Add Brand from Issue
concurrency:
  group: update-brands
  cancel-in-progress: false
on:
  issues:
    types: [opened]

jobs:
  update-database:
    if: github.actor == 'derBoedi' && startsWith(github.event.issue.title, 'Add:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Process Brand Data
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: python .github/scripts/add_brand.py

      - name: Alert on Failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "⚠️ **Automatisierung fehlgeschlagen:** Die KI hat ungültiges JSON generiert oder das Schema gebrochen. Bitte manuell prüfen."
          
      - name: Commit and Push Changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add brands.json
          git commit -m "Auto-added brand via Issue #${{ github.event.issue.number }}"
          git push

      - name: Close Issue on Success
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} --comment "✅ Marke wurde erfolgreich formatiert, validiert und in die brands.json eingetragen."
